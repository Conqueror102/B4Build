version: 1

applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || true
            - corepack enable
            - corepack prepare pnpm@9.15.9 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            # === CRITICAL: Inject env vars for Next.js server runtime ===
            - echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" >> .env.production
            - echo "CLERK_SECRET_KEY=${CLERK_SECRET_KEY}" >> .env.production

            # Add any other variables you need
            - echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" >> .env.production
            - echo "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" >> .env.production

            # === Debug lines (keep for now, remove later) ===
            - echo "=== Injected .env.production ==="
            - cat .env.production || true
            - echo "CLERK_SECRET_KEY length:" && echo ${#CLERK_SECRET_KEY} || echo "NOT SET"

            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*