name: Terraform

# Terraform apply runs locally (terraform.tfvars is gitignored; CI apply used defaults and
# could revert ECS env vars such as CORS_ALLOW_ORIGINS). PRs still get plan + fmt + validate.
on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.6
  # Must match resource names in infra/envs/dev
  ECS_CLUSTER: b4build-dev
  ECS_SERVICE: b4build-backend

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ecr_image_tag (match running ECS so plan does not revert a SHA pin)
        id: ecr_tag
        run: |
          set -e
          TAG="latest"
          if TD_ARN=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].taskDefinition' --output text 2>/dev/null) && [ -n "$TD_ARN" ] && [ "$TD_ARN" != "None" ]; then
            if IMG=$(aws ecs describe-task-definition --task-definition "$TD_ARN" --query 'taskDefinition.containerDefinitions[0].image' --output text 2>/dev/null) && [ -n "$IMG" ]; then
              TAG="${IMG##*:}"
            fi
          fi
          echo "ecr_image_tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        run: |
          cd infra/envs/dev
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd infra/envs/dev
          terraform init -input=false

      - name: Terraform Validate
        run: |
          cd infra/envs/dev
          terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          cd infra/envs/dev
          terraform plan -no-color -out=tfplan -var="ecr_image_tag=${{ steps.ecr_tag.outputs.ecr_image_tag }}"
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
