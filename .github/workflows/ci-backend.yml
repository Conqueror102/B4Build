name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache uv’s download + venv so repeat runs are much faster than cold `uv sync`.
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen

      # One step: ruff is fast; splitting only adds overhead.
      - name: Ruff (lint + format check)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Tests
        run: uv run pytest tests/ --cov=src --cov-report=term-missing

      # Often the slowest step; keep it on main so merges still prove the image builds.
      - name: Docker image (smoke)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker build -t b4build-backend:test .
