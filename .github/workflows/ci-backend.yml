name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run ruff (linter)
        run: |
          cd backend
          uv run ruff check .

      - name: Run ruff (formatter check)
        run: |
          cd backend
          uv run ruff format --check .

      - name: Run mypy (type checker)
        run: |
          cd backend
          uv run mypy src

      - name: Run tests
        run: |
          cd backend
          uv run pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Build Docker image (smoke test)
        run: |
          cd backend
          docker build -t b4build-backend:test .
