# Runs only when the Next.js app (or this workflow) changes. Backend/infra work does not trigger this job.
name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          # Public build-time values; in GitHub, add a repo secret (use Clerk *test* keys) if the build errors.
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
