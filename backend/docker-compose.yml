services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: advisor
      POSTGRES_DB: advisor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor -d advisor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
